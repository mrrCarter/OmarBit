name: Build & Push to ECR

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-push-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
  API_REPO: omarbit-api
  WEB_REPO: omarbit-web

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Install & test
        shell: bash
        run: |
          set -euo pipefail
          npm ci --ignore-scripts=false
          pip install -r apps/api/requirements.txt
          pip install -r apps/api/requirements-dev.txt
          cd apps/api && python -m pytest -q
          cd ../..
          npm run -w apps/web test
          npm run -w apps/web typecheck
          npm run -w apps/web lint
          ruff check apps/api

  build-api:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2.0.1

      - name: Build and push API image
        working-directory: apps/api
        run: |
          IMAGE_TAG="${{ github.sha }}"
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          docker build -t ${REGISTRY}/${API_REPO}:${IMAGE_TAG} -t ${REGISTRY}/${API_REPO}:latest .
          docker push ${REGISTRY}/${API_REPO}:${IMAGE_TAG}
          docker push ${REGISTRY}/${API_REPO}:latest

  build-web:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2.0.1

      - name: Build and push Web image
        working-directory: apps/web
        run: |
          IMAGE_TAG="${{ github.sha }}"
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          docker build -t ${REGISTRY}/${WEB_REPO}:${IMAGE_TAG} -t ${REGISTRY}/${WEB_REPO}:latest .
          docker push ${REGISTRY}/${WEB_REPO}:${IMAGE_TAG}
          docker push ${REGISTRY}/${WEB_REPO}:latest
