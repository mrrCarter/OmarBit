# Omar Gate — AI-powered security review for pull requests.
# Runs the SentinelLayer Omar action on every PR to surface security,
# compliance, and code-quality issues before merge. Findings are posted
# as inline PR comments with severity levels (P1-P4).
# Docs: https://docs.sentinelayer.com/omar-gate

name: Omar Gate Security Review
on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: omar-gate-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'
      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm ci --ignore-scripts=false
          python -m pip install --upgrade pip
          if [ -f apps/api/requirements-locked.txt ]; then
            python -m pip install --require-hashes -r apps/api/requirements-locked.txt
          fi
          if [ -f apps/api/requirements-dev-locked.txt ]; then
            python -m pip install --require-hashes -r apps/api/requirements-dev-locked.txt
          fi
      - name: Lint
        shell: bash
        run: |
          set -euo pipefail
          npm run typecheck --if-present
          npm run lint --if-present
          ruff check .

  test:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'
      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm ci --ignore-scripts=false
          python -m pip install --upgrade pip
          if [ -f apps/api/requirements-locked.txt ]; then
            python -m pip install --require-hashes -r apps/api/requirements-locked.txt
          fi
          if [ -f apps/api/requirements-dev-locked.txt ]; then
            python -m pip install --require-hashes -r apps/api/requirements-dev-locked.txt
          fi
      - name: Test
        shell: bash
        run: |
          set -euo pipefail
          npm test --if-present
          python -m pytest -q

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
      - name: Install and build
        shell: bash
        run: |
          set -euo pipefail
          npm ci --ignore-scripts=false
          npm run build --if-present

  security-gate:
    needs: [lint, test, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      # OPENAI_API_KEY: required by SentinelLayer for LLM-based analysis.
      # Risk mitigations: fork_policy=block prevents fork PRs from accessing
      # secrets; key is a repository secret with no environment scope needed
      # since this runs on every PR (not just production deploys).
      - uses: mrrCarter/sentinelayer-v1-action@14ca51c75ca81fdb6e6b7668d417d6a5abc39018 # v1.3.4 (allowlisted)
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          use_codex: 'true'
          codex_only: 'true'
          codex_model: gpt-5.3-codex
          codex_timeout: '480'
          model_fallback: gpt-4.1-mini
          llm_failure_policy: block
          run_harness: 'true'
          fork_policy: block
          telemetry: 'false'
          sentinelayer_managed_llm: 'false'
          training_opt_in: 'false'
          max_input_tokens: '120000'
          sentinelayer_spec_id: 31a72b526381f229fd006d3748b239cbb5afd6ba3705518cd182f4be9fae9e5c
          severity_gate: P2
          scan_mode: deep
          share_metadata: 'false'
          policy_pack: omar
          policy_pack_version: v1
