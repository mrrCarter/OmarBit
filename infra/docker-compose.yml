version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omarbit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omarbit}
      POSTGRES_DB: ${POSTGRES_DB:-omarbit}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "127.0.0.1:6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-omarbit}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-omarbit123}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio-data:/data

  api:
    build: ../apps/api
    env_file: ../.env
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - db
      - redis

  web:
    build: ../apps/web
    env_file: ../.env
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - api

  worker:
    build: ../workers
    env_file: ../.env
    depends_on:
      - api
      - redis
      - db

volumes:
  pgdata:
  minio-data:
