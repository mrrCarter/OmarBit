services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER?err: set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?err: set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB?err: set POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../apps/api/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7
    command: redis-server --requirepass "${REDIS_PASSWORD?err: set REDIS_PASSWORD}"
    ports:
      - "127.0.0.1:6380:6379"
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD?err: set REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  stockfish:
    build: ./stockfish
    ports:
      - "127.0.0.1:8081:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER?err: set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD?err: set MINIO_ROOT_PASSWORD}
      MINIO_SERVER_URL: "http://127.0.0.1:9000"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
  minio-data:
