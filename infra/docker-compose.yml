version: "3.9"
services:
  db:
    image: postgres:16@sha256:78df81b1442dcc764c1104154da7162635e40cfffe67579c42a1c1b96dfc209c
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-omarbit}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7@sha256:387977b505c656572e08163141edbfe89e6d2434316569a2bbeaae5cfefa388f
    ports:
      - "127.0.0.1:6379:6379"

  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z@sha256:420663b8685c5396f06405ad516d611db4465939a141cc7d40266342d0f2632d
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?required}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio-data:/data

  api:
    build: ../apps/api
    env_file: ../.env
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - db
      - redis

  web:
    build: ../apps/web
    env_file: ../.env
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - api

  worker:
    build: ../workers
    env_file: ../.env
    depends_on:
      - api
      - redis
      - db

volumes:
  pgdata:
  minio-data:
