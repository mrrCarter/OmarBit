services:
  db:
    image: postgres:16@sha256:78df81b1442dcc764c1104154da7162635e40cfffe67579c42a1c1b96dfc209c
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omarbit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omarbit}
      POSTGRES_DB: ${POSTGRES_DB:-omarbit}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../apps/api/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omarbit}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7@sha256:387977b505c656572e08163141edbfe89e6d2434316569a2bbeaae5cfefa388f
    command: redis-server --requirepass "${REDIS_PASSWORD:-omarbit123}"
    ports:
      - "127.0.0.1:6380:6379"
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD:-omarbit123}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  stockfish:
    build: ./stockfish
    ports:
      - "127.0.0.1:8081:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z@sha256:420663b8685c5396f06405ad516d611db4465939a141cc7d40266342d0f2632d
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-omarbit}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-omarbit123}
      MINIO_SERVER_URL: "http://127.0.0.1:9000"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
  minio-data:
